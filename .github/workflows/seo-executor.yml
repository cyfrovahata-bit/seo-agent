name: SEO Executor

on:
  schedule:
    # Кожні 2 години — щоб кнопки в Telegram спрацьовували швидше
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python executor.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}

      - name: Зберегти оновлений стан назад у репозиторій
        run: |
          git config user.name "seo-agent"
          git config user.email "seo-agent@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "chore: update execution state [skip ci]"
          # pull --rebase щоб уникнути конфліктів якщо інший job теж зробив push
          git pull --rebase origin HEAD || true
          git push || git push --force-with-lease
