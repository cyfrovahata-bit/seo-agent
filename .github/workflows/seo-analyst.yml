name: SEO Analyst

on:
  schedule:
    # Щопонеділка 07:00 за Києвом (05:00 UTC)
    - cron: "0 5 * * 1"
  workflow_dispatch: {}  # дозволяє запустити вручну кнопкою "Run workflow"

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python analyst.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}

      - name: Зберегти оновлений стан назад у репозиторій
        run: |
          git config user.name "seo-agent"
          git config user.email "seo-agent@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "chore: update SEO snapshot [skip ci]"
          git push
